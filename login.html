<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login Form</title>
    <!-- Librería de íconos -->
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css'>
    <!-- tipografía -->
    <link rel='stylesheet'
        href='https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&amp;display=swap'>
    <!-- hoja de estilos -->
    <link rel="stylesheet" href="./style.css">

</head>

<body>
    <!-- formulario de inicio de sesión -->
    <div class="content">
        <form action="">
            <h2>Login</h2>
            <div class="input-box">
                <input type="text" placeholder="Matrícula" required />
                <i class="ri-user-fill"></i>
            </div>
            <div class="input-box">
                <input type="password" id="password" placeholder="Contraseña" required autocomplete="new-password" />
                <i class="ri-eye-off-fill toggle-password" id="togglePassword"></i>
            </div>
            <div class="remember">
                <label><input type="checkbox" />Recordarme</label>
            </div>
            <button type="submit" class="btnn">Iniciar Sesión</button>
            <div class="button">

            </div>
        </form>
    </div>
    <script src="./script.js"></script>

</body>

</html>

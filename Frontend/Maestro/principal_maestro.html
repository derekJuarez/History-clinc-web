<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Maestro</title>
    <!-- Librería de íconos -->
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css'>
    <!-- Tipografía -->
    <link rel='stylesheet'
        href='https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap'>
    <!-- Hoja de estilos del dashboard de alumno (que tiene el diseño deseado) -->
    <link rel="stylesheet" href="../css/alumno.css">
</head>

<body>

    <!-- Sidebar -->
    <!-- Sidebar Dinámico -->
    <div id="sidebar-container" data-menu="maestro"></div>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Header -->
        <header class="top-header">
            <div class="conteo de pacientes ">

                <p>Monitoreo y Conteo de Pacientes por Alumno</p>
            </div>
        </header>


        <section class="content-area">
            <div class="conteo-pacientes-wrapper">
                <div class="conteo-header-pill main-title-pill">MONITOREO DE ALUMNOS</div>
                <div class="conteo-grid">
                    <!-- Columna: Nombre del Alumno -->
                    <div class="conteo-column">
                        <div class="conteo-header-pill">Nombre del Alumno</div>
                        <div class="conteo-body-box" id="lista-nombres-alumnos">
                            <!-- Se cargará dinámicamente -->
                        </div>
                    </div>
                    <!-- Columna: Clinica -->
                    <div class="conteo-column">
                        <div class="conteo-header-pill">Clínica</div>
                        <div class="conteo-body-box" id="lista-clinicas-alumnos">
                            <!-- Se cargará dinámicamente -->
                        </div>
                    </div>
                    <!-- Columna: Pacientes -->
                    <div class="conteo-column">
                        <div class="conteo-header-pill">Pacientes</div>
                        <div class="conteo-body-box" id="lista-pacientes-alumnos">
                            <!-- Se cargará dinámicamente -->
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>


    <!-- Script para cargar el menú dinámico (debe ir primero) -->
    <script src="../script_menu.js"></script>
    <script src="./maestro_script.js"></script>
</body>

</html>

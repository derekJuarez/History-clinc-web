<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Maestro</title>
    <!-- Librería de íconos -->
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css'>
    <!-- Tipografía -->
    <link rel='stylesheet'
        href='https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap'>
    <!-- Hoja de estilos del dashboard de alumno (que tiene el diseño deseado) -->
    <link rel="stylesheet" href="../../css/alumno.css">
</head>

<body>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="icon">
                <i class="ri-user-fill"></i>
            </div>
            <div class="title-text">
                <h2>Bienvenido</h2>
                <span>Panel de control</span>
            </div>
        </div>

        <div class="menu-label">Menú Principal</div>

        <nav class="sidebar-menu">
            <ul>
                <li>
                    <a href="#" class="active">
                        <i class="ri-bar-chart-box-fill"></i>
                        Conteo de pacientes
                    </a>
                </li>
                <li>
                    <a href="#">
                        <i class="ri-user-add-fill"></i>
                        Agregar alumno
                    </a>
                </li>
                <li>
                    <a href="#">
                        <i class="ri-list-check-2"></i>
                        Lista de alumnos
                    </a>
                </li>
                <li>
                    <a href="#">
                        <i class="ri-add-circle-fill"></i>
                        Nueva sección
                    </a>
                </li>
                <li>
                    <a href="#">
                        <i class="ri-layout-grid-fill"></i>
                        Ver secciones
                    </a>
                </li>
                <li>
                    <a href="#">
                        <i class="ri-file-add-fill"></i>
                        Nueva historia
                    </a>
                </li>
                <li>
                    <a href="#">
                        <i class="ri-file-list-3-fill"></i>
                        Ver historias
                    </a>
                </li>
            </ul>
        </nav>

        <div class="sidebar-footer">
            <a href="#">
                <i class="ri-settings-3-fill"></i>
                Configuración
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Header -->
        <header class="top-header">
            <button class="toggle-btn" id="menuToggle">
                <i class="ri-layout-right-line"></i>
            </button>
            <div class="header-title">
                <h1>Panel Principal</h1>
                <p>Bienvenido (Maestro)</p>
            </div>
        </header>

        <!-- Content Area -->
        <section class="content-area">
            <!-- Content will go here -->
        </section>
    </main>

    <!-- Script del dashboard -->
    <script src="./maestro_script.js"></script>
</body>

</html>

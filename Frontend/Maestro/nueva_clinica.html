<!DOCTYPE html>
<html lang="es">
<head>
    <script src="/js/custom_alert.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b1a30">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Solicitud de Clinica</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="../css/alumno.css">
</head>
<body>
    <div id="sidebar-container" data-menu="maestro"></div>
    <main class="main-content">
        <header class="top-header">
            <div class="header-title">
                <h1>Solicitud de Unidad Clinica</h1>
                <p>Envia una solicitud de registro de nueva clinica</p>
            </div>
        </header>
        <section class="content-area">
            <div class="glass-form-container">
                <h2>Solicitud de Registro de Clinica</h2>
                <form id="registro-clinica-form">
                    <fieldset class="form-section">
                        <legend><span class="step-number">1</span> DATOS DE LA CLINICA</legend>
                        <div class="form-section-content">
                            <div class="input-box">
                                <label for="nombre-clinica">Nombre de Clinica</label>
                                <input type="text" id="nombre-clinica" placeholder="Nombre de Clinica" required>
                            </div>
                            <div class="input-box">
                                <label for="encargado-clinica">Encargado</label>
                                <input type="text" id="encargado-clinica" placeholder="Encargado" readonly style="background: rgba(255,255,255,0.05);">
                            </div>
                            <div class="input-box">
                                <label for="cedula-clinica">Cedula Profesional</label>
                                <input type="text" id="cedula-clinica" placeholder="Cedula Profesional" required>
                            </div>
                        </div>
                    </fieldset>
                    <fieldset class="form-section">
                        <legend><span class="step-number">2</span> UBICACION</legend>
                        <div class="form-section-content">
                            <div class="input-box">
                                <label for="calle-clinica">Calle</label>
                                <input type="text" id="calle-clinica" placeholder="Calle" required>
                            </div>
                            <div class="input-box">
                                <label for="colonia-clinica">Colonia</label>
                                <input type="text" id="colonia-clinica" placeholder="Colonia" required>
                            </div>
                            <div class="input-box" style="grid-column: span 2;">
                                <label for="numero-cp-clinica">Numero y Codigo Postal</label>
                                <input type="text" id="numero-cp-clinica" placeholder="Numero y Codigo Postal" required>
                            </div>
                        </div>
                    </fieldset>
                    <button type="submit" class="btn-submit">Enviar Solicitud</button>
                </form>
            </div>
        </section>
    </main>
    <script src="../script_menu.js"></script>
    <script src="./nueva_clinica.js"></script>
</body>
</html>

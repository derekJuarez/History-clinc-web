<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Alumnos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="../css/alumno.css">
</head>
<body>
    <div id="sidebar-container" data-menu="maestro"></div>
    <main class="main-content">
        <header class="top-header">
            <div class="header-title">
                <h1>Registro de Alumnos</h1>
                <p>Panel de administracion y Registro de Alumnos</p>
            </div>
        </header>
        <section class="content-area">
            <div class="glass-form-container">
                <h2>Registro de Alumnos</h2>
                <form id="registro-alumno-form">
                    <fieldset class="form-section">
                        <legend><span class="step-number">1</span> DATOS DEL ALUMNO</legend>
                        <div class="form-section-content">
                            <div class="input-box">
                                <label for="nombre-alumno">Nombre de Alumno</label>
                                <input type="text" id="nombre-alumno" placeholder="Nombre de Alumno" required>
                            </div>
                            <div class="input-box">
                                <label for="matricula-alumno">Matricula</label>
                                <input type="text" id="matricula-alumno" placeholder="Matricula" required>
                            </div>
                            <div class="input-box" style="grid-column: span 2;">
                                <label for="unidad-clinica-alumno">Unidad Clinica</label>
                                <input type="text" id="unidad-clinica-alumno" placeholder="Unidad Clinica" required>
                            </div>
                        </div>
                    </fieldset>
                    <button type="submit" class="btn-submit">Confirmar Registro</button>
                </form>
            </div>
        </section>
    </main>
    <script src="./agregar_alumno.js"></script>
    <script src="../script_menu.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Alumnos</title>
    <!-- Librería de íconos -->
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css'>
    <!-- Tipografía -->
    <link rel='stylesheet'
        href='https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap'>
    <!-- Hoja de estilos del dashboard (que tiene el diseño deseado) -->
    <link rel="stylesheet" href="../css/alumno.css">
</head>

<body>

    <!-- Sidebar Dinámico -->
    <div id="sidebar-container" data-menu="maestro"></div>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Header -->
        <header class="top-header">
            <div class="header-title">
                <h1>Registro de Alumnos</h1>
                <p>Panel de administración y Registro de Alumnos</p>
            </div>
        </header>

        <section class="content-area">
            <!-- Contenedor con fondo negro -->
            <div class="conteo-pacientes-wrapper">
                <!-- Título principal tipo banner -->
                <div class="conteo-header-pill main-title-pill">REGISTRO DE ALUMNOS</div>

                <form id="registro-alumno-form" style="margin-top: 24px;">
                    <!-- Distribución en 3 columnas iguales -->
                    <div class="conteo-grid">
                        <!-- Columna: Nombre de Alumnos -->
                        <div class="conteo-column">
                            <div class="conteo-header-pill">Nombre de Alumno</div>
                            <input type="text" id="nombre-alumno" class="clinica-input" required>
                        </div>
                        <!-- Columna: Matricula  -->
                        <div class="conteo-column">
                            <div class="conteo-header-pill">Matricula</div>
                            <input type="text" id="matricula-alumno" class="clinica-input" required>
                        </div>
                        <!-- Columna: Unidad Clinica -->
                        <div class="conteo-column">
                            <div class="conteo-header-pill">Unidad Clinica</div>
                            <input type="text" id="unidad-clinica-alumno" class="clinica-input" required>
                        </div>
                    </div>

                    <!-- Botón Confirmar centrado -->
                    <div class="submit-container"
                        style="display: flex; justify-content: center; margin-top: 35px; width: 100%;">
                        <button type="submit" class="btn-submit"
                            style="width: auto; padding: 0 50px; grid-column: auto;">Confirmar Registro</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <!-- Script para comportamiento específico -->
    <script src="./agregar_alumno.js"></script>
    <!-- Script para cargar el menú dinámico -->
    <script src="../script_menu.js"></script>
</body>

</html>

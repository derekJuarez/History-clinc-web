<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citas</title>    
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css'>
    <link rel='stylesheet' href='https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap'>
    <link rel="stylesheet" href="../css/alumno.css">
</head>
<body>
    <!-- Sidebar Dinámico -->
    <div id="sidebar-container" data-menu="alumno"></div>
        <main class="main-content">
        <!-- Top Header -->
        <header class="top-header">
            <button class="toggle-btn">
                <i class="ri-layout-right-line"></i>
            </button>
            <div class="header-title">
                <h1>Agendar citas</h1>
            </div>
        </header>
                <!-- Content Area -->
        <section class="content-area">
            <div class="glass-form-container">
                <form id="FormCitas">
                    <div class="input-box">
                        <label for="fecha">Fecha </label>
                        <input type="date" id="fecha" required />
                    </div>
                    <div class="input-box">
                        <label for="hora">Hora</label>
                        <input type="time" id="hora" required />
                    </div>
                    <div class="input-box">
                        <label for="ubicacion">Ubicación</label>
                        <select id="ubicacion" required>
                            <option value="">Selecciona Ubicación</option>
                            <!-- se agregaran de manera dinamica las ubicaciones disponibles para las citas -->
                        </select>
                    </div>
                    <div class="input-box">
                        <label for="estatus">Estatus</label>
                        <select id="estatus" required>
                            <option value="">Selecciona Estatus</option>
                            <!-- se agregaran de manera dinamica los estatus disponibles para las citas -->
                        </select>
                    </div>
                    <div class="input-box">
                        <label for="paciente">Paciente</label>
                        <select id="paciente" required>
                            <option value="">Selecciona Paciente</option>
                            <!-- se agregaran de manera dinamica los pacientes disponibles para las citas -->
                        </select>
                        <div class="input-box">
                            <label for="motivo">Motivo</label>
                            <input type="text" id="motivo" required>
                        </div>
                    </div>
                    <div class="input-box">
                        <label for="docente">Docente asesor</label>
                        <select id="docente" required>
                            <option value="">Selecciona Docente Asesor</option>
                            <!-- se agregaran de manera dinamica los docentes disponibles para las citas -->
                        </select>
                    </div>
                    <button id="submitRegistro" type="submit" class="btn-submit">Confirmar Registro</button>
                </form>
            </div>
        </section>
    </main>
    <script src="../script_menu.js"></script>
</body>
</html>

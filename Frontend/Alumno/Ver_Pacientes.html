<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Pacientes</title>
    <!-- Librería de íconos -->
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css'>
    <!-- Tipografía -->
    <link rel='stylesheet'
        href='https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap'>  
    <!-- Hoja de estilos del dashboard de alumno-->
    <link rel="stylesheet" href="../css/alumno.css">
</head>
<body>

    <!-- Sidebar -->
    <!-- Sidebar Dinámico -->
    <div id="sidebar-container" data-menu="alumno"></div>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Header -->
        <header class="top-header">
            <button class="toggle-btn">
                <i class="ri-layout-right-line"></i>
            </button>
            <div class="header-title">
                <h1>Panel Principal</h1>
                <p>Bienvenido (Alumno)</p>
            </div>
        </header>
        <!-- Content Area -->
        <section class="content-area">
            <div class="content-header">
                <h2>Pacientes</h2>
                <table class="pacientes-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Edad</th>
                            <th>Género</th>
                            <th>Teléfono</th>
                            <th>Email</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Aquí se agregarán dinámicamente los pacientes -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="../script_menu.js"></script>
</body>
</html>

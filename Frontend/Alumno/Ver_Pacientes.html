<!DOCTYPE html>
<html lang="es">
<head>
    <script src="/js/custom_alert.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b1a30">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ver Pacientes</title>
    <!-- Librería de íconos -->
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css'>
    <!-- Tipografía -->
    <link rel='stylesheet'
        href='https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap'>  
    <!-- Hoja de estilos del dashboard de alumno-->
    <link rel="stylesheet" href="../css/alumno.css">
    <style>
        .glass-table-container h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 25px;
            text-align: center;
            color: #cbb26a;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <!-- Sidebar Dinámico -->
    <div id="sidebar-container" data-menu="alumno"></div>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Header -->
        <header class="top-header">
            <div class="header-title">
                <h1>Lista de Pacientes</h1>
                <p>Ver y gestionar todos los pacientes del sistema</p>
            </div>
        </header>
        <!-- Content Area -->
        <section class="content-area">
            <div class="glass-table-container">
                <h2>Pacientes Registrados</h2>
                <table class="pacientes-table">
                    <thead>
                        <tr>
                            <th>ID (CURP)</th>
                            <th>Nombre Completo</th>
                            <th>Edad</th>
                            <th>Género</th>
                            <th>Teléfono</th>
                            <th>Email</th>
                            <th>Radiografia</th>
                        </tr>
                    </thead>
                    <tbody id="TablaPacientes">
                        <!-- Aquí se agregarán dinámicamente los pacientes -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="../script_menu.js"></script>
</body>
<script src="ver_pacientes.js"></script>
</html>

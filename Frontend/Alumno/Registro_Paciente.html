<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Paciente</title>
    <!-- Librería de íconos -->
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css'>
    <!-- Tipografía -->
    <link rel='stylesheet'
        href='https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap'>
    <!-- Hoja de estilos del dashboard de alumno-->
    <link rel="stylesheet" href="../../css/alumno.css">
</head>

<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="icon">
                <i class="ri-user-fill"></i>
            </div>
            <div class="title-text">
                <h2>Bienvenido</h2>
                <span>Panel de control</span>
            </div>
        </div>

        <div class="menu-label">Menú Principal</div>

        <nav class="sidebar-menu">
            <ul>
                <li>
                    <a href="dashboard.html">
                        <i class="ri-layout-grid-fill"></i>
                        Panel Principal
                    </a>
                </li>
                <li>
                    <a href="#">
                        <i class="ri-bar-chart-fill"></i>
                        Historial clinico
                    </a>
                </li>
                <li class="has-submenu">
                    <a href="#" class="submenu-toggle">
                        <i class="ri-group-fill"></i>
                        Paciente
                        <i class="ri-arrow-down-s-line dropdown-icon"
                            style="margin-left: auto; margin-right: 0; font-size: 18px;"></i>
                    </a>
                    <ul class="submenu">
                        <li><a href="Registro_Paciente.html" class="active">Registrar Paciente</a></li>
                        <li><a href="Ver_Pacientes.html">Ver Pacientes</a></li>
                    </ul>
                </li>
                <li>
                    <a href="#">
                        <i class="ri-shopping-cart-fill"></i>
                        Citas
                    </a>
                </li>
                <li>
                    <a href="#">
                        <i class="ri-file-list-3-fill"></i>
                        Reportes
                    </a>
                </li>
            </ul>
        </nav>

        <div class="sidebar-footer">
            <a href="#">
                <i class="ri-settings-3-fill"></i>
                Configuración
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Header -->
        <header class="top-header">
            <button class="toggle-btn">
                <i class="ri-layout-right-line"></i>
            </button>
            <div class="header-title">
                <h1>Registro de Paciente</h1>
            </div>
        </header>

        <!-- Content Area -->
        <section class="content-area">
            <div class="glass-form-container">
                <h2>Información del Paciente</h2>
                <form id="registroPacienteForm">
                    <div class="input-box">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" placeholder="Nombre Completo" required />
                    </div>
                    <div class="input-box">
                        <label for="edad">Edad</label>
                        <input type="number" id="edad" placeholder="Edad" required />
                    </div>
                    <div class="input-box">
                        <label for="genero">Género</label>
                        <select id="genero" required>
                            <option value="">Selecciona Género</option>
                            <option value="masculino">Masculino</option>
                            <option value="femenino">Femenino</option>
                        </select>
                    </div>
                    <div class="input-box">
                        <label for="telefono">Teléfono</label>
                        <input type="tel" id="telefono" placeholder="Teléfono" required />
                    </div>
                    <div class="input-box">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" placeholder="Correo Electrónico" required />
                    </div>

                    <button id="submitRegistro" type="submit" class="btn-submit">Confirmar Registro</button>
                </form>
            </div>
        </section>
    </main>


    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const submenuToggles = document.querySelectorAll('.submenu-toggle');

            submenuToggles.forEach(toggle => {
                toggle.addEventListener('click', function (e) {
                    e.preventDefault();
                    const parentLi = this.parentElement;
                    parentLi.classList.toggle('active');
                });
            });
        });
    </script>

</body>

</html>

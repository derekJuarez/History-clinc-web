<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Paciente</title>
    <!-- Librería de íconos -->
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css'>
    <!-- Tipografía -->
    <link rel='stylesheet'
        href='https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap'>
    <!-- Hoja de estilos del dashboard de alumno-->
    <link rel="stylesheet" href="../css/alumno.css">
</head>

<body>

    <!-- Sidebar -->
    <!-- Sidebar Dinámico -->
    <div id="sidebar-container" data-menu="alumno"></div>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Header -->
        <header class="top-header">
            <button class="toggle-btn">
                <i class="ri-layout-right-line"></i>
            </button>
            <div class="header-title">
                <h1>Registro de Paciente</h1>
            </div>
        </header>

        <!-- Content Area -->
        <section class="content-area">
            <div class="glass-form-container">
                <h2>Información del Paciente</h2>
                <form id="registroPacienteForm">
                    <div class="input-box">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" placeholder="Nombre Completo" required />
                    </div>
                    <div class="input-box">
                        <label for="edad">Edad</label>
                        <input type="number" id="edad" placeholder="Edad" required />
                    </div>
                    <div class="input-box">
                        <label for="genero">Género</label>
                        <select id="genero" required>
                            <option value="">Selecciona Género</option>
                            <option value="masculino">Masculino</option>
                            <option value="femenino">Femenino</option>
                        </select>
                    </div>
                    <div class="input-box">
                        <label for="telefono">Teléfono</label>
                        <input type="tel" id="telefono" placeholder="Teléfono" required />
                    </div>
                    <div class="input-box">
                        <label for="email">Correo Electrónico</label>
                        <input type="email" id="email" placeholder="Correo Electrónico" required />
                    </div>
                    <div class="input-box">
                        <label for="direccion">Dirección</label>
                        <input type="text" id="direccion" placeholder="Dirección" required />
                    </div>

                    <button id="submitRegistro" type="submit" class="btn-submit">Confirmar Registro</button>
                </form>
            </div>
        </section>
    </main>


    <script src="../script_menu.js   "></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <script src="/js/custom_alert.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b1a30">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Registro de Paciente</title>
    <!-- Librería de íconos -->
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css'>
    <!-- Tipografía -->
    <link rel='stylesheet'
        href='https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap'>
    <!-- Hoja de estilos del dashboard de alumno-->
    <link rel="stylesheet" href="../css/alumno.css">
</head>

<body>

    <!-- Sidebar -->
    <!-- Sidebar Dinámico -->
    <div id="sidebar-container" data-menu="alumno"></div>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Header -->
        <header class="top-header">
            <div class="header-title">
                <h1>Registro de Paciente</h1>
            </div>
        </header>

        <!-- Content Area -->
        <section class="content-area">
            <div class="glass-form-container">
                <h2>Confirmar Registro</h2>
                <form id="registroPacienteForm">
                    <fieldset class="form-section">
                        <legend><span class="step-number">1</span> DATOS DE LA CUENTA </legend>
                        <div class="form-section-content">
                            <div class="input-box">
                                <label for="curp">CURP</label>
                                <input type="text" id="curp" placeholder="CURP" required />
                            </div>

                            <div class="input-box">
                                <label for="name">Nombre Completo</label>
                                <input type="text" id="name" placeholder="Nombre Completo" required />
                            </div>

                            <div class="input-box">
                                <label for="telefono">Teléfono</label>
                                <input type="tel" id="telefono" placeholder="Teléfono" required />
                            </div>

                            <div class="input-box">
                                <label for="correo">Correo Electrónico</label>
                                <input type="email" id="correo" placeholder="Correo Electrónico" required />
                            </div>

                            <!-- El rol es predeterminado "Paciente" y la contraseña se autogenerará, por lo que no se muestran al usuario -->
                            <input type="hidden" id="rol" value="Paciente" />
                        </div>
                    </fieldset>

                    <fieldset class="form-section">
                        <legend><span class="step-number">2</span> INFORMACIÓN PERSONAL Y CLÍNICA</legend>
                        <div class="form-section-content">
                            <div class="input-box">
                                <label for="fecha_nacimiento">Fecha de Nacimiento</label>
                                <input type="date" id="fecha_nacimiento" required />
                            </div>

                            <div class="input-box">
                                <label for="sexo">Sexo</label>
                                <select id="sexo" required>
                                    <option value="" disabled selected>M/F/</option>
                                    <option value="M">Masculino</option>
                                    <option value="F">Femenino</option>
                                </select>
                            </div>

                            <div class="input-box">
                                <label for="estado_civil">Estado Civil</label>
                                <input type="text" id="estado_civil" placeholder="Estado Civil" />
                            </div>

                            <div class="input-box">
                                <label for="ocupacion">Ocupación</label>
                                <input type="text" id="ocupacion" placeholder="Ocupación" />
                            </div>

                            <div class="input-box" style="grid-column: span 2;">
                                <label for="residencia">Lugar de Origen/Residencia</label>
                                <input type="text" id="residencia" placeholder="Lugar de Origen/Residencia" />
                            </div>

                            <div class="input-box">
                                <label for="tel_emergencia">Teléfono de Emergencia</label>
                                <input type="tel" id="tel_emergencia" placeholder="Teléfono de Emergencia" />
                            </div>

                            <div class="input-box">
                                <label for="contacto_familiar">Nombre de Contacto Familiar</label>
                                <input type="text" id="contacto_familiar" placeholder="Nombre de Contacto Familiar" />
                            </div>
                        </div>
                    </fieldset>

                    <button id="submitRegistro" type="submit" class="btn-submit">
                        FINALIZAR Y REGISTRAR PACIENTE
                    </button>
                </form>
            </div>
        </section>
    </main>


    <script src="../script_menu.js"></script>
    <script src="Registro_paciente.js"></script>

</body>

</html>

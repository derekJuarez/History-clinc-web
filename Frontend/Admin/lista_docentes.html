<!DOCTYPE html>
<html lang="es">
<head>
    <script src="/js/custom_alert.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b1a30">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Lista de Docentes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="../css/alumno.css">
    <style>
        .glass-table-container h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 25px;
            text-align: center;
            color: #cbb26a;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .btn-delete {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            font-weight: 500;
            transition: background-color 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-delete:hover {
            background-color: #dc2626;
            transform: scale(1.02);
        }
        .btn-delete:active { transform: scale(0.98); }

        .btn-edit {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            font-weight: 500;
            transition: background-color 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-right: 8px;
        }
        .btn-edit:hover {
            background-color: #2563eb;
            transform: scale(1.02);
        }
        .btn-edit:active { transform: scale(0.98); }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-box {
            background: rgba(11, 26, 48, 0.95);
            border: 1px solid rgba(203, 178, 106, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            padding: 25px;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        .modal-overlay.active .modal-box {
            transform: scale(1);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(203, 178, 106, 0.2);
            padding-bottom: 10px;
        }
        .modal-header h3 {
            color: #cbb26a;
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .modal-close {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
        }
        .modal-close:hover {
            color: #cbb26a;
        }
        .modal-body {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .modal-body form {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-cancel {
            background: transparent;
            color: #fff;
            border: 1px solid #cbb26a;
            border-radius: 20px;
            padding: 8px 20px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-cancel:hover {
            background: rgba(203, 178, 106, 0.1);
        }
    </style>
</head>
<body>
    <div id="sidebar-container" data-menu="admin"></div>
    <main class="main-content">
        <header class="top-header">
            <div class="header-title">
                <h1>Lista de Docentes Asesores</h1>
                <p>Ver y gestionar todos los docentes del sistema</p>
            </div>
        </header>
        <section class="content-area">
            <div class="glass-table-container">
                <h2>Docentes Registrados</h2>
                <table class="pacientes-table">
                    <thead>
                        <tr>
                            <th>Matricula (ID)</th>
                            <th>Nombre Completo</th>
                            <th>Telefono</th>
                            <th>Email</th>
                            <th style="text-align: center;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="TablaDocentes">
                        <tr>
                            <td colspan="5" style="text-align: center; color: #cbb26a; padding: 20px;">
                                Cargando docentes...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
    <!-- Modal de Edición de Docente -->
    <div class="modal-overlay" id="modalEditarDocente">
        <div class="modal-box">
            <div class="modal-header">
                <h3>Editar Docente Asesor</h3>
                <button class="modal-close" onclick="cerrarModalDocente()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="formEditarDocente">
                    <input type="hidden" id="edit-docente-matricula">
                    <div class="input-box">
                        <label for="edit-docente-nombre">Nombre Completo</label>
                        <input type="text" id="edit-docente-nombre" placeholder="Nombre Completo" required>
                    </div>
                    <div class="input-box">
                        <label for="edit-docente-telefono">Teléfono</label>
                        <input type="tel" id="edit-docente-telefono" placeholder="Teléfono" required>
                    </div>
                    <div class="input-box">
                        <label for="edit-docente-correo">Correo Electrónico</label>
                        <input type="email" id="edit-docente-correo" placeholder="Correo Electrónico" required>
                    </div>
                    <div class="input-box">
                        <label for="edit-docente-contrasena">Contraseña (Opcional)</label>
                        <input type="password" id="edit-docente-contrasena" placeholder="Nueva contraseña (dejar vacío si no cambia)">
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-cancel" onclick="cerrarModalDocente()">Cancelar</button>
                        <button type="submit" class="btn-submit" style="width: auto; padding: 0 30px; margin-top: 0; height: 40px; border-radius: 20px;">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../script_menu.js"></script>
    <script src="lista_docentes.js"></script>
</body>
</html>

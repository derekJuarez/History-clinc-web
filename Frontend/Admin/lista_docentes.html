<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Docentes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
    <link rel="stylesheet" href="../css/alumno.css">
    <style>
        .glass-table-container h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 25px;
            text-align: center;
            color: #cbb26a;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .btn-delete {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            font-weight: 500;
            transition: background-color 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-delete:hover {
            background-color: #dc2626;
            transform: scale(1.02);
        }
        .btn-delete:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div id="sidebar-container" data-menu="admin"></div>
    <main class="main-content">
        <header class="top-header">
            <div class="header-title">
                <h1>Lista de Docentes Asesores</h1>
                <p>Ver y gestionar todos los docentes del sistema</p>
            </div>
        </header>
        <section class="content-area">
            <div class="glass-table-container">
                <h2>Docentes Registrados</h2>
                <table class="pacientes-table">
                    <thead>
                        <tr>
                            <th>Matricula (ID)</th>
                            <th>Nombre Completo</th>
                            <th>Telefono</th>
                            <th>Email</th>
                            <th style="text-align: center;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="TablaDocentes">
                        <tr>
                            <td colspan="5" style="text-align: center; color: #cbb26a; padding: 20px;">
                                Cargando docentes...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
    <script src="../script_menu.js"></script>
    <script src="lista_docentes.js"></script>
</body>
</html>

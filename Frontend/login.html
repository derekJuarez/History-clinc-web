<!DOCTYPE html>
<html lang="en">

<head>
    <script src="/js/custom_alert.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a1628">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Login</title>
    <!-- Librería de íconos -->
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css'>
    <!-- tipografía -->
    <link rel='stylesheet'
        href='https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&amp;display=swap'>
    <!-- hoja de estilos -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body>
    <!-- formulario de inicio de sesión -->
    <main class="mainContainer">
        <div class="flip-card">
            <input type="checkbox" id="flip-toggle">
            <div class="flip-card-inner">
                <section class="flip-front">
                    <img src="Image/logo-umsnh.png" alt="Logo UMSNH" class="login-logo">
                    <h2>Bienvenido</h2>
                    <div id="error-message"
                        style="color: #ff4d4d; font-size: 13px; text-align: center; margin-bottom: 15px; display: none; background: rgba(255, 77, 77, 0.1); padding: 8px; border-radius: 5px; border: 1px solid rgba(255, 77, 77, 0.3);">
                    </div>
                    <form id="loginForm">
                        <div class="input-box">
                            <label for="matricula">Matrícula</label>
                            <input type="text" id="matricula" placeholder="Matrícula" required />
                        </div>
                        <div class="input-box">
                            <label for="contraseña">Contraseña</label>
                            <input type="password" id="contraseña" placeholder="Contraseña" required />
                        </div>
                        <div class="remember">
                            <label><input type="checkbox" />Recordarme</label>
                        </div>

                        <button id="submit" type="submit" class="btn-submit">Iniciar Sesión</button>

                        <!-- Botón Para redireccionar a Registro-->
                        <div class="Login-box">
                            <p>¿No tienes una cuenta?<a href="Registro.html"> Registrate</a></p>
                        </div>
                    </form>
                </section>
            </div>
        </div>
    </main>
    <script src="login.js"></script>

</body>

</html>

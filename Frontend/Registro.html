<!DOCTYPE html>
<html lang="es">

<head>
    <script src="/js/custom_alert.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a1628">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Registro</title>
    <!--Librería de iconos-->
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css'>
    <!--Tipografía-->
    <link rel='stylesheet'
        href='https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap'>
    <!--Hoja de estilos-->
    <link rel='stylesheet' href='./css/registro.css'>
</head>

<body>
    <div class="register-container">
        <img src="Image/logo-umsnh.png" alt="Logo UMSNH" class="register-logo">
        <h2>Registro</h2>
        <form id="registerForm">
            <!-- Nombre Y Apellido (Fila Doble) -->
            <div class="row-names">
                <input type="text" id="nombre" class="input-field" placeholder="Nombre" required>
                <input type="text" id="apellido" class="input-field" placeholder="Apellido" required>
            </div>
            <!-- Matricula -->
            <div class="input-group">
                <i class="ri-user-line input-icon"></i>
                <input type="text" id="matricula" class="input-field" placeholder="Matricula" required>
            </div>
            <!-- Email -->
            <div class="input-group">
                <i class="ri-mail-line input-icon"></i>
                <input type="email" id="email" class="input-field" placeholder="Email" required>
            </div>
            <!--Telefono de usuario-->
            <div class="input-group">
                <i class="ri-phone-line input-icon"></i>
                <input type="tel" id="telefono" class="input-field" placeholder="Telefono" required>
            </div>
            <!-- Rol (Alumno / Maestro) -->
            <div class="input-group">
                <i class="ri-shield-user-line input-icon"></i>
                <select id="rol" class="input-field" required>
                    <option value="" disabled selected hidden>Selecciona tu Rol</option>
                    <option value="2">Alumno</option>
                    <option value="1">Maestro</option>
                    <option value="3">Administrador</option>
                </select>
            </div>
            <!-- Selector de Maestro (Solo visible para Alumnos) -->
            <div id="maestro-group" class="input-group" style="display: none;">
                <i class="ri-user-star-line input-icon"></i>
                <input type="text" id="maestro-search" class="input-field" placeholder="Escribe el nombre de tu Maestro encargado" list="maestros-list" autocomplete="off">
                <datalist id="maestros-list"></datalist>
            </div>
            <!-- Contraseña -->
            <div class="input-group">
                <i class="ri-lock-line input-icon"></i>
                <input type="password" id="contraseña" class="input-field" placeholder="Contraseña" required>
            </div>
            <!-- Confirmar contraseña -->
            <div class="input-group">
                <i class="ri-lock-unlock-line input-icon"></i>
                <input type="password" id="confirmarContraseña" class="input-field" placeholder="Confirmar Contraseña"
                    required>
            </div>

            <!-- Botón Confirmar (Para finalizar el registro) -->
            <div class="submit-container">
                <button type="submit" class="btn-submit">Confirmar</button>
            </div>
            <!-- Botón Para redireccionar a Login-->
            <div class="Login-box">
                <p>¿Ya tienes una cuenta?<a href="login.html"> Iniciar Sesión</a></p>
            </div>
        </form>



    </div>

</body>
<!--Script-->
<script src="./js/registro.js"></script>

</html>
